name: Test Docker image

on:
  pull_request:
    paths-ignore:
      - 'deploy/charts/**'
    branches: [ main*, feat/*, hotfix/* ]
  workflow_dispatch:

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}-docker-test
  cancel-in-progress: true

env:
  REGISTRY: harbor.3key.company
  IMAGE: harbor.3key.company/czertainly/czertainly-hashicorp-vault-connector
  DOCKERFILE: ./Dockerfile
  # cache scope so both jobs share the same cache namespace
  CACHE_SCOPE: czertainly-hashicorp-vault-connector

permissions:
  contents: read

jobs:
  build_amd64:
    name: Build amd64
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Check out the repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build (amd64) - local only (no push)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.IMAGE }}:ci
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}-amd64
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE }}-amd64
          build-args: |
            VERSION=${{ github.ref_name }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:ci
          format: json
          output: trivy-report-amd64.json
          exit-code: 0

      - name: Upload vulnerability report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-report-amd64
          path: trivy-report-amd64.json

      - name: Fail build on vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:ci
          trivy-config: config/trivy.yaml
          skip-setup-trivy: true

  build_arm64:
    name: Build arm64
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build (arm64) - local only (no push)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          platforms: linux/arm64
          push: false
          load: true
          tags: ${{ env.IMAGE }}:ci
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}-arm64
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE }}-arm64
          build-args: |
            VERSION=${{ github.ref_name }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:ci
          format: json
          output: trivy-report-arm64.json
          exit-code: 0

      - name: Upload vulnerability report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-report-arm64
          path: trivy-report-arm64.json

      - name: Fail build on vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:ci
          trivy-config: config/trivy.yaml
          skip-setup-trivy: true
